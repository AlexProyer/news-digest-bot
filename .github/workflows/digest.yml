name: News Digest

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache sent_urls.json
        uses: actions/cache@v4
        with:
          path: sent_urls.json
          key: sent-urls-${{ github.repository }}
          restore-keys: |
            sent-urls-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python digest.py

      - name: Commit updated sent_urls.json
        if: always()
        run: |
          if [ -f sent_urls.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent_urls.json
            git diff --staged --quiet || git commit -m "chore: update sent_urls.json [skip ci]"
            git push || echo "Nothing to push"
          fi
